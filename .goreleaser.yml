version: 2

project_name: apkpure

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/apkpure
    binary: apkpure
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: github-native

brews:
  - repository:
      owner: kyungw00k
      name: homebrew-cli
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kyungw00k/apkpure"
    description: "CLI tool to download APK files from APKPure"
    license: "MIT"
    install: |
      bin.install "apkpure"
    test: |
      assert_match "apkpure version", shell_output("#{bin}/apkpure -V")

release:
  github:
    owner: kyungw00k
    name: apkpure
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
